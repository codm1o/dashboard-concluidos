  <!DOCTYPE html>
  <html lang="pt-BR">
  <head>

  <!-- Configurações básicas da página -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJRF — Dashboard de Concluídos</title>

  <!-- Biblioteca de gráficos -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <!-- Estilos -->
  <style>  
  </head>
  <body>

  
/* Reset — remove estilos padrão do navegador
   (margens, paddings e garante box-sizing consistente) */
  *, 
  *::before,
  *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body { 
    font-family: 'Georgia', serif; 
    background: #EDEAE4; 
    min-height: 100vh; 
    padding: 1.5rem; 
  }

  /* Layout — container principal do dashboard */
  .dash { 
    max-width: 1400px; 
    margin: 0 auto; 
    display: flex; 
    flex-direction: column; 
    gap: 14px; }

  /* Header — identidade visual do escritório */
  .header {
    background: #1a1a1a;
    padding: 1.25rem 1.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 12px;
  }

  /* Header: bloco esquerdo (logo + nome) */
  .header-left { 
    display: flex; 
    align-items: center; 
    gap: 1rem; 
  }

  /* Logo estilizada */
  .logo-x { 
    font-size: 28px; 
    color: #C9951A; 
    font-weight: 900; 
    line-height: 1; 
    font-family: sans-serif; 
  } 

  .logo-x span { 
    color: #6B6B6B; 
  }

/* Logo símbolo */
.logo-icon {
  height: 46px;
  width: auto;
  display: block;
}

.header-left {
  align-items: center;
}


  /* Nome do escritório */
  .firm-name h1 { 
    font-size: 18px; 
    font-weight: 400; 
    color: #C9951A; 
    letter-spacing: 0.5px; 
    line-height: 1.2; 
  }


  .firm-name p  { 
    font-size: 11px; 
    color: #888; 
    letter-spacing: 2px; 
    text-transform: uppercase; 
    font-family: sans-serif; 
  }

  /* Header: bloco direito (título e mês) */
  .header-right { 
    text-align: right; 
  }

  .header-right p    { 
    font-size: 11px; 
    color: #888; 
    font-family: sans-serif; 
    letter-spacing: 1px; 
    text-transform: uppercase; 
  }

  .header-right span { 
    font-size: 15px; 
    color: #C9951A; 
    font-family: sans-serif; 
    font-weight: 500; 
  }

  /* Navegação de meses — troca entre relatórios */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 12px 18px;
    flex-wrap: wrap;
  }

  /* Label "Período" */
  .month-nav-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-family: sans-serif;
    margin-right: 6px;
    white-space: nowrap;
  }

  /* Botões dos meses */
  .month-tab {
    font-family: sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #444;
    background: transparent;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  
/* Filtro global de área */
.area-filter {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #1a1a1a;
  border-radius: 12px;
  padding: 10px 16px;
  margin-top: 6px;
}

.area-filter span {
  font-size: 11px;
  color: #888;
  font-family: sans-serif;
}

.area-filter button {
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 14px;
  border: 1px solid #444;
  background: transparent;
  color: #888;
  cursor: pointer;
}

.area-filter button.active {
  background: #C9951A;
  color: #1a1a1a;
  border-color: #C9951A;
}

  /* Estado: mês ativo/selecionado */
  .month-tab.active {
    background: #C9951A;
    border-color: #C9951A;
    color: #1a1a1a;
    font-weight: 700;
  }

  /* Estado: hover em mês disponível */
  .month-tab:not(.unavailable):not(.active):hover {
    border-color: #C9951A;
    color: #C9951A;
  }

  /* Estado: mês sem base carregada ainda */
  .month-tab.unavailable {
    opacity: 0.4;
    cursor: not-allowed;
    border-style: dashed;
  }
  
  .month-tab.upcoming {
    border-color: #444;
    color: #555;
    font-style: italic;
    cursor: default;
  }
  .month-nav-separator {
    width: 1px;
    height: 20px;
    background: #333;
    margin: 0 4px;
  }

 /* KPI cards — métricas principais do dashboard */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }

  /* Card individual de KPI */
  .kpi {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    position: relative;
    overflow: hidden;
  }

  /* KPI card — indicador lateral por tipo de métrica */
  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: 4px 0 0 4px;
  }

  /* Cores por tipo de KPI */
  .kpi.gold::before   { background: #C9951A; }
  .kpi.gray::before   { background: #6B6B6B; }
  .kpi.green::before  { background: #3B6D11; }
  .kpi.red::before    { background: #A32D2D; }
  .kpi.amber::before  { background: #B8860B; }

  /* Label do KPI */
  .kpi-label { 
    font-size: 10px; 
    color: #888; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    font-family: sans-serif; 
    margin-bottom: 6px; 
  }

  /* Valor principal do KPI */
  .kpi-value { 
    font-size: 28px; 
    font-weight: 400; 
    color: #1a1a1a; 
    line-height: 1; 
  }

 /* Texto auxiliar abaixo do KPI */
  .kpi-sub   { 
    font-size: 11px; 
    color: #888; 
    margin-top: 5px; 
    font-family: sans-serif; 
  }

   /* Destaque dentro do texto auxiliar */
  .kpi-sub b { 
    color: #C9951A; 
  }

  /* Estado: alerta (ex: atrasos) */
  .kpi-sub.danger { 
    color: #A32D2D; 
    font-weight: 600; 
  }

  /* Estado: positivo (ex: dentro do prazo) */
  .kpi-sub.success { 
    color: #3B6D11; 
    font-weight: 600; 
  }

  /* KPI mini — breakdown de prazos (D0 a D+) */
  .kpi-mid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }

  /* Card individual (mini KPI) */
  .kpi-sm {
    background: #F1EFE8;
    border-radius: 8px;
    padding: 0.875rem 1rem;
    text-align: center;
  }

  /* Label do mini KPI (ex: D0, D-1) */
  .kpi-sm-label { 
    font-size: 10px; 
    color: #888; 
    font-family: sans-serif; 
    text-transform: uppercase; 
    letter-spacing: 0.5px; 
    margin-bottom: 4px; 
  }

  /* Valor principal */
  .kpi-sm-val   { 
    font-size: 24px; 
    font-weight: 500; 
    font-family: sans-serif; 
  }

  /* Percentual abaixo do valor */
  .kpi-sm-pct   { 
    font-size: 11px; 
    font-family: sans-serif; 
    color: #888; 
    margin-top: 2px; 
  }

  /* Cores por faixa de prazo */
  .d0c  { color: #C9951A; } /* D0 — prazo no dia */
  .dm1c { color: #9E7414; } /* D-1 */
  .dm2c { color: #B8860B; } /* D-2 */
  .dm3c { color: #6B6B6B; } /* D-3 ou antes */
  .dpc  { color: #A32D2D; } /* D+ (após data fatal) */

  /* ════════════════════════════════════════════════════════════════
    CARDS GENÉRICOS
    ════════════════════════════════════════════════════════════════ */
  .card {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    font-family: sans-serif;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 14px; height: 3px;
    background: #C9951A;
    border-radius: 2px;
    display: inline-block;
    flex-shrink: 0;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    font-family: sans-serif;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '';
    width: 14px; height: 3px;
    background: #C9951A;
    border-radius: 2px;
    display: inline-block;
  }

  /* ════════════════════════════════════════════════════════════════
    LAYOUTS DE GRADE
    ════════════════════════════════════════════════════════════════ */
  .charts-row  { display: grid; grid-template-columns: 1fr 1.8fr; gap: 12px; }
  .bottom-row  { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; }
  .two-col     { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .three-col   { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ════════════════════════════════════════════════════════════════
    RANKING TABLE — tabela de prazos por profissional
    ════════════════════════════════════════════════════════════════ */
  .ranking-table { width: 100%; border-collapse: collapse; font-family: sans-serif; font-size: 12px; }
  .ranking-table thead th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    padding: 6px 8px;
    text-align: left;
    border-bottom: 0.5px solid rgba(0,0,0,0.1);
  }
  .ranking-table tbody tr { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
  .ranking-table tbody tr:last-child { border-bottom: none; }
  .ranking-table td { padding: 7px 8px; vertical-align: middle; }
  .prof-cell { display: flex; align-items: center; }
  .prof-initial {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #F5E0A0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
    color: #9E7414;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .num-center { text-align: center; }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 500; }
  .badge-dp { background: #FECACA; color: #7F1D1D; }
  .badge-ok { background: #FEF3C7; color: #92400E; }

  /* ════════════════════════════════════════════════════════════════
    LEGENDAS DE GRÁFICO
    ════════════════════════════════════════════════════════════════ */
  .legends { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; font-family: sans-serif; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ════════════════════════════════════════════════════════════════
    NEW: SEM JUSTIFICATIVA — cards por área
    Usado tanto para Advogados quanto para Estagiários
    ════════════════════════════════════════════════════════════════ */
  .sj-area-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-top: 10px;
  }
  /* Card de área individual */
  .sj-area-card {
    border-radius: 10px;
    padding: 1rem 1.1rem;
    border: 0.5px solid rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }
  .sj-area-card::before {
    content: '';

    top: 0; left: 0;

  /* Cores por área */

  .sj-area-card.civel::before { background: #C9951A; }
  .sj-area-card.trabalhista   { background: #fff; }

  .sj-area-card.tributario    { background: #fff; }

  .sj-area-name { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; font-family: sans-serif; margin-bottom: 4px; }
  .sj-area-count { font-size: 26px; font-family: sans-serif; font-weight: 600; color: #1a1a1a; line-height: 1.1; }
  .sj-area-count.zero  { color: #3B6D11; }
  .sj-area-count.warn  { color: #B8860B; }
  .sj-area-count.danger { color: #A32D2D; }
  .sj-area-sub { font-size: 11px; color: #888; font-family: sans-serif; margin-top: 3px; }

  /* Totalizador de sem justificativa */
  .sj-total-badge {
    display: inline-flex;

    gap: 6px;
    font-family: sans-serif;
    font-size: 12px;

    margin-bottom: 4px;
    font-weight: 500;
  }
  .sj-total-badge.ok  { background: #EAF3DE; color: #3B6D11; }
  .sj-total-badge.warn { background: #FEF3C7; color: #92400E; }
  .sj-total-badge.bad { background: #FECACA; color: #7F1D1D; }

  /* ════════════════════════════════════════════════════════════════
    NEW: DISTRIBUIÇÃO POR ÁREA — seção de prazos por área jurídica
    ════════════════════════════════════════════════════════════════ */
  .area-dist-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }
  .area-dist-card {
    background: #F1EFE8;
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
  }
  .area-dist-name  { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; font-family: sans-serif; margin-bottom: 4px; }
  .area-dist-count { font-size: 28px; font-family: sans-serif; font-weight: 600; }
  .area-dist-pct   { font-size: 12px; color: #888; font-family: sans-serif; margin-top: 3px; }
  .area-trab { color: #C9951A; }
  .area-civ  { color: #9E7414; }
  .area-trib { color: #B8860B; }

  /* ════════════════════════════════════════════════════════════════
    INDICADOR DE DADOS INDISPONÍVEIS
    Mostrado quando o mês selecionado não tem base carregada
    ════════════════════════════════════════════════════════════════ */
  .no-data-banner {

  }

  /* ════════════════════════════════════════════════════════════════
    SEPARADOR DE SEÇÃO
    ════════════════════════════════════════════════════════════════ */
  .section-sep {

  /* Rodapé */

    text-align: center;

  </style>

  <div class="dash">

<!-- Filtro de área -->

  <!-- ════════════════════════════════════════════════════
      CABEÇALHO — identidade visual do escritório
      A data é atualizada dinamicamente ao trocar de mês
      ════════════════════════════════════════════════════ -->
  <div class="header">
  
<div class="header-left">
  <img 
    src="https://juvenizjr.com.br/wp-content/uploads/2022/07/icone_banner.png"
    class="logo-icon"
    alt="Logo Juveniz Jr">

      <div class="firm-name">
        <h1>Juveniz Jr. Rolim Ferraz</h1>
        <p>Advogados Associados</p>
      </div>
    </div>
    <div class="header-right">
      <p>Relatório de Concluídos</p>
      <span id="header-month-label"></span>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════
      CONTEÚDO PRINCIPAL — renderizado dinamicamente
      ════════════════════════════════════════════════════ -->
  <div id="main-content"></div>

  <!-- Rodapé -->
  <div class="footer">Juveniz Jr · Rolim Ferraz Advogados · Dashboard de Concluídos · 2026</div>

  </div><!-- /.dash -->

  <script>
  /* ═══════════════════════════════════════════════════════════════════════
    CAMADA DE DADOS — RELATÓRIOS MENSAIS
    ───────────────────────────────────────────────────────────────────────
    Cada entrada corresponde a um mês.
    Para carregar um novo mês:
      1. Defina "available: true"
      2. Preencha os campos com os dados da base de concluídos
      3. Popule os arrays profData e sjDetails
    ═══════════════════════════════════════════════════════════════════════ */
  let MONTHS_DATA = {};
  let currentMonth = 'abril';
  let areaAtual = 'todas';
  let charts = {};

  fetch("dados.json")
    .then(r => r.json())
    .then(data => {
      MONTHS_DATA = data;

      // Ativa/desativa botões automaticamente
      document.querySelectorAll('.month-tab').forEach(btn => {
        const mes = btn.dataset.month;
        if (MONTHS_DATA[mes]?.available) {
          btn.classList.remove("unavailable");
        } else {
          btn.classList.add("unavailable");
        }
      });

    renderDashboard(currentMonth);
  })
    .catch(err => {
      console.error("Erro ao carregar JSON:", err);
    });

  /* Formata número com separador de milhar (pt-BR) */
  function fmt(n) { return n.toLocaleString('pt-BR'); }

  /* Calcula percentual e retorna string "X,X%" */
  function pct(part, total) {
    if (!total) return '0,0%';
    return (part / total * 100).toFixed(1).replace('.', ',') + '%';
  }

/* Filtro por área */
function filtrarArea(lista, area) {
  if (area === 'todas') return lista;
  return lista.filter(p => p.area === area);
}

  /* Destrói uma instância Chart.js existente (evita vazamento de memória) */
  function destroyChart(id) {
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  }

  /* ═══════════════════════════════════════════════════════════════════════
    RENDERIZAÇÃO PRINCIPAL
    Chamada ao carregar a página e ao trocar de mês
    ═══════════════════════════════════════════════════════════════════════ */
  function renderDashboard(monthKey) {
    const data = MONTHS_DATA[monthKey];
    const container = document.getElementById('main-content');

    /* Atualiza label do cabeçalho */
    document.getElementById('header-month-label').textContent = data.label;

    /* Caso o mês não tenha dados, exibe banner de aviso */
    if (!data.available) {
      container.innerHTML = `
        <div class="no-data-banner">
          <h3>${data.label}</h3>
          <p>Base de dados ainda não carregada para este período.<br>
            Aguarde o fechamento do mês ou importe a planilha de concluídos.</p>
        </div>`;
      return;
    }

    /* ── Monta o HTML completo do dashboard ── */
    container.innerHTML = buildDashboardHTML(data);

    /* ── Inicializa todos os gráficos ── */
    renderDonutChart(data);
    renderRankingChart(data);
    renderStackedChart(data);
    renderPerfChart(data);
    renderAreaChart(data);    // NEW: distribuição por área
  }

  /* ═══════════════════════════════════════════════════════════════════════
    CONSTRUÇÃO DO HTML DO DASHBOARD
    Retorna a string HTML completa de todas as seções
    ═══════════════════════════════════════════════════════════════════════ */
  function buildDashboardHTML(d) {

    /* ── Dados calculados ── */
    
      // Aplica filtro de área
      const listaFiltrada = filtrarArea(d.profData, areaAtual);

      // Ranking geral
      const sortedAll = [...listaFiltrada].sort((a,b) => b.total - a.total);

      // Ranking de prazos
      const sortedPrazo = [...listaFiltrada]
        .filter(p => (p.d0+p.dm1+p.dm2+p.dm3+p.dp) > 0)
        .sort((a,b) => (b.d0+b.dm1+b.dm2+b.dm3+b.dp) - (a.d0+a.dm1+a.dm2+a.dm3+a.dp));
      const areaTotal = d.areaTrabalhista + d.areaCivel + d.areaTributario;

    /* ── Badges de sem justificativa ── */
    function sjBadge(total) {
      if (total === 0) return `<span class="sj-total-badge ok">0 ocorrências</span>`;
      if (total <= 3)  return `<span class="sj-total-badge warn">${total} ocorrência${total>1?'s':''}</span>`;
      return                   `<span class="sj-total-badge bad">${total} ocorrências</span>`;
    }

    /* ── Card de área para sem justificativa ── */
    function sjAreaCard(area, count, totalSj, cssClass) {
      const severity = count === 0 ? 'zero' : count <= 2 ? 'warn' : 'danger';
      const extra = count > 0 ? ' has-violations' : '';
      const pctSj = totalSj > 0 ? ` · ${pct(count, totalSj)} do total` : '';
      return `
        <div class="sj-area-card ${cssClass}${extra}">
          <div class="sj-area-name">${area}</div>
          <div class="sj-area-count ${severity}">${count}</div>
          <div class="sj-area-sub">caso${count !== 1 ? 's' : ''}${pctSj}</div>
        </div>`;
    }

    /* ── Ranking table rows ── */
    const medals = ['🥇','🥈','🥉'];
    const rankRows = sortedPrazo.map((p, i) => {
      const t = p.d0+p.dm1+p.dm2+p.dm3+p.dp;
      const initials = p.name.split(' ').map(n=>n[0]).slice(0,2).join('');
      const dpBadge  = p.dp > 0
        ? `<span class="badge badge-dp">${p.dp}</span>`
        : `<span style="color:#ccc;font-size:11px">—</span>`;
      let cargoBadge = '';
      if (p.cargo === 'Advogado') {
      cargoBadge = `<span style="font-size:9px;color:#C9951A;background:#FEF3C7;padding:1px 6px;border-radius:10px">Adv</span>`;
      }
      else if (p.cargo === 'Coordenador') {
      cargoBadge = `<span style="font-size:9px;color:#155E75;background:#E0F2FE;padding:1px 6px;border-radius:10px">Coord</span>`;
      }
      else {
      cargoBadge = `<span style="font-size:9px;color:#888;background:#F1EFE8;padding:1px 6px;border-radius:10px">Est</span>`;
      }
      return `
        <tr>
          <td style="font-size:13px;width:24px">${i < 3 ? medals[i] : `<span style="color:#aaa;font-size:11px">${i+1}</span>`}</td>
          <td>
            <div class="prof-cell">
              <div class="prof-initial">${initials}</div>
              <div>
                <span style="color:#1a1a1a;font-weight:500">${p.name}</span>
                <div style="margin-top:2px">${cargoBadge}</div>
              </div>
            </div>
          </td>
          <td class="num-center" style="font-weight:600">${t}</td>
          <td class="num-center" style="color:#C9951A;font-weight:500">${p.d0||'—'}</td>
          <td class="num-center" style="color:#9E7414">${p.dm1||'—'}</td>
          <td class="num-center" style="color:#B8860B">${p.dm2||'—'}</td>
          <td class="num-center">${dpBadge}</td>
        </tr>`;
    }).join('');

    return `
      <!-- ════════════════════════════════════════
          SEÇÃO 1: KPI CARDS — métricas principais
          ════════════════════════════════════════ -->
      <div class="kpi-grid">
        <div class="kpi gold">
          <div class="kpi-label">Total concluídos</div>
          <div class="kpi-value">${fmt(d.totalConcluidos)}</div>
          <div class="kpi-sub">tarefas, prazos e etapas</div>
        </div>
        <div class="kpi gray">
          <div class="kpi-label">Tarefas</div>
          <div class="kpi-value">${fmt(d.tarefas)}</div>
          <div class="kpi-sub"><b>${d.pctTarefas}</b> do total</div>
        </div>
        <div class="kpi green">
          <div class="kpi-label">Prazos processuais</div>
          <div class="kpi-value">${fmt(d.prazos)}</div>
          <div class="kpi-sub success">${d.pctPrazo} cumpridos no prazo</div>
        </div>
        ${d.etapas > 0 ? `
        <div class="kpi amber">
          <div class="kpi-label">Etapas de prazo</div>
          <div class="kpi-value">${fmt(d.etapas)}</div>
          <div class="kpi-sub">${pct(d.etapas, d.totalConcluidos)} do total</div>
        </div>` : `
        <div class="kpi amber">
          <div class="kpi-label">Sem justificativa</div>
          <div class="kpi-value" style="color:#B8860B">${d.sjAdv.total + d.sjEst.total}</div>
          <div class="kpi-sub">D0/D-1 sem registro</div>
        </div>`}
        <div class="kpi red">
          <div class="kpi-label">Após data fatal (D+)</div>
          <div class="kpi-value">${fmt(d.dPlus)}</div>
          <div class="kpi-sub danger">${pct(d.dPlus, d.prazos)} dos prazos</div>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 2: BREAKDOWN D0–D+ (mini KPIs)
          ════════════════════════════════════════ -->
      <div class="kpi-mid">
        <div class="kpi-sm">
          <div class="kpi-sm-label">⚡ D0</div>
          <div class="kpi-sm-val d0c">${d.d0}</div>
          <div class="kpi-sm-pct">${pct(d.d0, d.prazos)}</div>
        </div>
        <div class="kpi-sm">
          <div class="kpi-sm-label">🟡 D-1</div>
          <div class="kpi-sm-val dm1c">${d.dm1}</div>
          <div class="kpi-sm-pct">${pct(d.dm1, d.prazos)}</div>
        </div>
        <div class="kpi-sm">
          <div class="kpi-sm-label">🟠 D-2</div>
          <div class="kpi-sm-val dm2c">${d.dm2}</div>
          <div class="kpi-sm-pct">${pct(d.dm2, d.prazos)}</div>
        </div>
        <div class="kpi-sm">
          <div class="kpi-sm-label">⚪ D-3 ou antes</div>
          <div class="kpi-sm-val dm3c">${d.dm3}</div>
          <div class="kpi-sm-pct">${pct(d.dm3, d.prazos)}</div>
        </div>
        <div class="kpi-sm">
          <div class="kpi-sm-label">🔴 D+ (fatal)</div>
          <div class="kpi-sm-val dpc">${d.dp}</div>
          <div class="kpi-sm-pct">${pct(d.dp, d.prazos)}</div>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 3: GRÁFICO DONUT + RANKING GERAL
          ════════════════════════════════════════ -->
      <div class="charts-row">
        <div class="card">
          <div class="card-title">distribuição de prazos</div>
          <div class="legends">
            <div class="legend-item"><div class="legend-dot" style="background:#C9951A"></div>D0 — ${d.d0}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#9E7414"></div>D-1 — ${d.dm1}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#E5C97A"></div>D-2 — ${d.dm2}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#6B6B6B"></div>D-3+ — ${d.dm3}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#A32D2D"></div>D+ fatal — ${d.dp}</div>
          </div>
          <div style="position:relative;width:100%;height:220px">
            <canvas id="donutChart" role="img" aria-label="Donut chart mostrando distribuição de prazos por antecedência">Distribuição: D0=${d.d0}, D-1=${d.dm1}, D-2=${d.dm2}, D-3+=${d.dm3}, D+=${d.dp}</canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">ranking — total de concluídos por profissional</div>
          <div style="position:relative;width:100%;height:${Math.max(260, sortedAll.slice(0,10).length * 32 + 60)}px">
            <canvas id="rankChart" role="img" aria-label="Barras horizontais com ranking de profissionais por total de concluídos">Ranking de concluídos por profissional.</canvas>
          </div>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 4: BREAKDOWN STACKED + TABELA
          ════════════════════════════════════════ -->
      <div class="bottom-row">
        <div class="card">
          <div class="card-title">prazos por profissional — breakdown D0/D-1/D-2/D+</div>
          <div style="position:relative;width:100%;height:${Math.max(300, sortedPrazo.length * 28 + 80)}px">
            <canvas id="stackedChart" role="img" aria-label="Barras horizontais empilhadas mostrando breakdown de prazos por profissional">Breakdown de prazos por profissional.</canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">tabela de prazos por profissional</div>
          <table class="ranking-table">
            <thead>
              <tr>
                <th></th>
                <th>Profissional</th>
                <th class="num-center">Total</th>
                <th class="num-center">D0</th>
                <th class="num-center">D-1</th>
                <th class="num-center">D-2</th>
                <th class="num-center">D+</th>
              </tr>
            </thead>
            <tbody>${rankRows}</tbody>
          </table>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 5: PERFORMANCE GERAL
          ════════════════════════════════════════ -->
      <div class="card">
        <div class="card-title">performance geral — prazos cumpridos vs. após data fatal</div>
        <div class="legends">
          <div class="legend-item"><div class="legend-dot" style="background:#C9951A"></div>Prazos dentro do prazo</div>
          <div class="legend-item"><div class="legend-dot" style="background:#A32D2D"></div>Após data fatal (D+)</div>
        </div>
        <div style="position:relative;width:100%;height:260px">
          <canvas id="perfChart" role="img" aria-label="Barras mostrando prazos cumpridos versus após data fatal por profissional">Performance geral de prazos por profissional.</canvas>
        </div>
      </div>

      <hr class="section-sep">

      <!-- ════════════════════════════════════════
          NEW SEÇÃO 6: PRAZOS SEM JUSTIFICATIVA — ADVOGADOS
          Mostra D0/D-1 concluídos sem justificativa registrada,
          agrupados por área jurídica (Cível · Trabalhista · Tributário).
          Impacto direto na elegibilidade de bônus trimestral.
          ════════════════════════════════════════ -->
      <div class="two-col">
        <div class="card">
          <div class="card-title">sem justificativa · advogados — por área</div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
            ${sjBadge(d.sjAdv.total)}
            <span style="font-family:sans-serif;font-size:11px;color:#888">
              D0 e D-1 concluídos sem justificativa registrada
            </span>
          </div>
          <div class="sj-area-grid">
            ${sjAreaCard('Cível',       d.sjAdv.civel,       d.sjAdv.total, 'civel')}
            ${sjAreaCard('Trabalhista', d.sjAdv.trabalhista,  d.sjAdv.total, 'trabalhista')}
            ${sjAreaCard('Tributário',  d.sjAdv.tributario,   d.sjAdv.total, 'tributario')}
          </div>
          <div style="margin-top:12px;font-family:sans-serif;font-size:10px;color:#aaa;line-height:1.5">
            ⚠️ Cada ocorrência sem justificativa implica perda do bônus trimestral para o advogado responsável.
          </div>
        </div>

        <!-- ════════════════════════════════════════
            NEW SEÇÃO 7: PRAZOS SEM JUSTIFICATIVA — ESTAGIÁRIOS
            Mesmo critério aplicado aos estagiários.
            Estagiários não participam do bônus mas o registro
            é mantido para fins de acompanhamento e gestão.
            ════════════════════════════════════════ -->
        <div class="card">
          <div class="card-title">sem justificativa · estagiários — por área</div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
            ${sjBadge(d.sjEst.total)}
            <span style="font-family:sans-serif;font-size:11px;color:#888">
              D0 e D-1 concluídos sem justificativa registrada
            </span>
          </div>
          <div class="sj-area-grid">
            ${sjAreaCard('Cível',       d.sjEst.civel,      d.sjEst.total, 'civel')}
            ${sjAreaCard('Trabalhista', d.sjEst.trabalhista, d.sjEst.total, 'trabalhista')}
            ${sjAreaCard('Tributário',  d.sjEst.tributario,  d.sjEst.total, 'tributario')}
          </div>
          <div style="margin-top:12px;font-family:sans-serif;font-size:10px;color:#aaa;line-height:1.5">
            ℹ️ Estagiários não participam do bônus trimestral. Acompanhamento para fins de gestão e formação.
          </div>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          NEW SEÇÃO 8: DISTRIBUIÇÃO DE PRAZOS POR ÁREA
          Mostra o volume de prazos processuais por área
          jurídica (Cível, Trabalhista, Tributário) com
          gráfico de barras horizontais para comparação visual.
          Fonte: Tabela Dinâmica · Tipo=Prazo, Evento=Principal.
          ════════════════════════════════════════ -->
      <div class="card">
        <div class="card-title">distribuição de prazos por área jurídica</div>

        <!-- Mini KPIs das 3 áreas -->
        <div class="area-dist-grid">
          <div class="area-dist-card">
            <div class="area-dist-name">Trabalhista</div>
            <div class="area-dist-count area-trab">${d.areaTrabalhista}</div>
            <div class="area-dist-pct">${pct(d.areaTrabalhista, areaTotal)} dos prazos</div>
          </div>
          <div class="area-dist-card">
            <div class="area-dist-name">Cível</div>
            <div class="area-dist-count area-civ">${d.areaCivel}</div>
            <div class="area-dist-pct">${pct(d.areaCivel, areaTotal)} dos prazos</div>
          </div>
          <div class="area-dist-card">
            <div class="area-dist-name">Tributário</div>
            <div class="area-dist-count area-trib">${d.areaTributario}</div>
            <div class="area-dist-pct">${pct(d.areaTributario, areaTotal)} dos prazos</div>
          </div>
        </div>

        <!-- Legendas do gráfico de área -->
        <div class="legends">
          <div class="legend-item"><div class="legend-dot" style="background:#C9951A"></div>Trabalhista — ${d.areaTrabalhista}</div>
          <div class="legend-item"><div class="legend-dot" style="background:#9E7414"></div>Cível — ${d.areaCivel}</div>
          <div class="legend-item"><div class="legend-dot" style="background:#E5C97A"></div>Tributário — ${d.areaTributario}</div>
        </div>

        <!-- Gráfico de barras horizontal por área -->
        <div style="position:relative;width:100%;height:140px">
          <canvas id="areaChart" role="img" aria-label="Barras horizontais comparando volume de prazos por área jurídica">Prazos: Trabalhista=${d.areaTrabalhista}, Cível=${d.areaCivel}, Tributário=${d.areaTributario}.</canvas>
        </div>
      </div>
    `;
  }

  /* ═══════════════════════════════════════════════════════════════════════
    GRÁFICOS — funções de renderização individuais
    ═══════════════════════════════════════════════════════════════════════ */

  /* ── Donut: distribuição de prazos D0/D-1/D-2/D-3+/D+ ── */
  function renderDonutChart(d) {
    destroyChart('donut');
    charts['donut'] = new Chart(document.getElementById('donutChart'), {
      type: 'doughnut',
      data: {
        labels: ['D0','D-1','D-2','D-3+','D+ Fatal'],
        datasets: [{
          data: [d.d0, d.dm1, d.dm2, d.dm3, d.dp],
          backgroundColor: ['#C9951A','#9E7414','#E5C97A','#6B6B6B','#A32D2D'],
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '62%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (c) => ` ${c.label}: ${c.raw} (${pct(c.raw, d.prazos)})`
            }
          }
        }
      }
    });
  }

  /* ── Barras horizontais: ranking total de concluídos ── */
  function renderRankingChart(d) {
    destroyChart('rank');
    const top10 = [...d.profData].sort((a,b)=>b.total-a.total).slice(0,10);
    charts['rank'] = new Chart(document.getElementById('rankChart'), {
      type: 'bar',
      data: {
        labels: top10.map(p => p.name.split(' ').slice(0,2).join(' ')),
        datasets: [{
          label: 'Total',
          data: top10.map(p => p.total),
          backgroundColor: top10.map((p,i) =>
            i===0 ? '#C9951A' : i===1 ? '#9E7414' : i===2 ? '#E5C97A' : '#D3D1C7'),
          borderRadius: 4,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (c) => ` ${c.raw} concluídos` } }
        },
        scales: {
          x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 } } },
          y: { grid: { display: false }, ticks: { font: { size: 11 } } }
        }
      }
    });
  }

  /* ── Barras empilhadas: breakdown D0/D-1/D-2/D-3+/D+ por profissional ── */
  function renderStackedChart(d) {
    destroyChart('stacked');
    const sorted = [...d.profData]
      .filter(p => (p.d0+p.dm1+p.dm2+p.dm3+p.dp) > 0)
      .sort((a,b) => (b.d0+b.dm1+b.dm2+b.dm3+b.dp) - (a.d0+a.dm1+a.dm2+a.dm3+a.dp));

    charts['stacked'] = new Chart(document.getElementById('stackedChart'), {
      type: 'bar',
      data: {
        labels: sorted.map(p => p.name.split(' ').slice(0,2).join(' ')),
        datasets: [
          { label: 'D0',      data: sorted.map(p=>p.d0),  backgroundColor: '#C9951A', stack: 'a' },
          { label: 'D-1',     data: sorted.map(p=>p.dm1), backgroundColor: '#9E7414', stack: 'a' },
          { label: 'D-2',     data: sorted.map(p=>p.dm2), backgroundColor: '#E5C97A', stack: 'a' },
          { label: 'D-3+',    data: sorted.map(p=>p.dm3), backgroundColor: '#B4B2A9', stack: 'a' },
          { label: 'D+ Fatal',data: sorted.map(p=>p.dp),  backgroundColor: '#A32D2D', stack: 'a' },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { stacked: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 } } },
          y: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } }
        }
      }
    });
  }

  /* ── Barras duplas: prazos cumpridos vs. D+ por profissional ── */
  function renderPerfChart(d) {
    destroyChart('perf');
    const sorted = [...d.profData].sort((a,b)=>b.total-a.total).filter(p=>p.total>0);
    charts['perf'] = new Chart(document.getElementById('perfChart'), {
      type: 'bar',
      data: {
        labels: sorted.map(p => p.name.split(' ').slice(0,2).join(' ')),
        datasets: [
          {
            label: 'Prazos no prazo',
            data: sorted.map(p => p.d0+p.dm1+p.dm2+p.dm3),
            backgroundColor: '#C9951A',
            borderRadius: 3,
            stack: 's'
          },
          {
            label: 'D+ Fatal',
            data: sorted.map(p => p.dp),
            backgroundColor: '#A32D2D',
            borderRadius: 3,
            stack: 's'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            stacked: true,
            grid: { display: false },
            ticks: { font: { size: 10 }, maxRotation: 35, autoSkip: false }
          },
          y: { stacked: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 } } }
        }
      }
    });
  }

  /* ── NEW: Barras horizontais — distribuição de prazos por área jurídica ── */
  function renderAreaChart(d) {
    destroyChart('area');
    charts['area'] = new Chart(document.getElementById('areaChart'), {
      type: 'bar',
      data: {
        labels: ['Trabalhista', 'Cível', 'Tributário'],
        datasets: [{
          label: 'Prazos',
          data: [d.areaTrabalhista, d.areaCivel, d.areaTributario],
          backgroundColor: ['#C9951A', '#9E7414', '#E5C97A'],
          borderRadius: 6,
          borderSkipped: false,
          barThickness: 28
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (c) => {
                const total = d.areaTrabalhista + d.areaCivel + d.areaTributario;
                return ` ${c.raw} prazos (${pct(c.raw, total)})`;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(0,0,0,0.04)' },
            ticks: { font: { size: 11 } },
            max: Math.max(d.areaTrabalhista, d.areaCivel, d.areaTributario) * 1.15
          },
          y: {
            grid: { display: false },
            ticks: { font: { size: 12, weight: 500 } }
          }
        }
      }
    });
  }

  /* ═══════════════════════════════════════════════════════════════════════
    NAVEGAÇÃO DE MESES
    Vincula os botões do seletor à função de renderização
    ═══════════════════════════════════════════════════════════════════════ */
  document.querySelectorAll('.month-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const monthKey = btn.dataset.month;
      const data = MONTHS_DATA[monthKey];

      /* Bloqueia clique em meses sem dados (upcoming) */
      if (btn.classList.contains('upcoming')) return;

      /* Atualiza estado visual dos tabs */
      document.querySelectorAll('.month-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      /* Guarda o mês ativo e re-renderiza */
      currentMonth = monthKey;
      renderDashboard(monthKey);
    });
  });
