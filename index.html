<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <!-- ═══════════════════════════════════════════════════════
      CONFIGURAÇÕES BÁSICAS DA PÁGINA
      charset: garante suporte a caracteres especiais (ç, ã, é)
      viewport: responsividade em dispositivos móveis
      ═══════════════════════════════════════════════════════ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJRF — Dashboard de Concluídos</title>

  <!-- Biblioteca de gráficos Chart.js (versão UMD — funciona sem bundler) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  <!-- ═══════════════════════════════════════════════════════
      ESTILOS GLOBAIS
      BUG CORRIGIDO #1: A tag <style> estava sendo fechada
      ANTES do conteúdo CSS, e o CSS ficava solto no <body>
      como texto visível. Toda a folha de estilos foi movida
      para dentro do bloco <style>...</style> correto.
      ═══════════════════════════════════════════════════════ -->
  <style>

    /* ── Reset: remove margens/paddings padrão do navegador
       box-sizing: border-box garante que padding não
       "estoure" o tamanho dos elementos ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Georgia', serif;
      background: #EDEAE4;
      min-height: 100vh;
      padding: 1.5rem;
    }

    /* ── Container principal: centraliza e empilha seções ── */
    .dash {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ════════════════════════════════════════════════════════
        HEADER — identidade visual do escritório
        Fundo escuro com logo + título à esquerda,
        e rótulo do relatório à direita.
        ════════════════════════════════════════════════════ */
    .header {
      background: #1a1a1a;
      padding: 1.25rem 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* Ícone/logo carregado via <img> */
    .logo-icon {
      height: 46px;
      width: auto;
      display: block;
    }

    /* Nome do escritório — dourado para reforçar marca */
    .firm-name h1 {
      font-size: 18px;
      font-weight: 400;
      color: #C9951A;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }

    /* Subtítulo em caixa-alta com espaçamento de letras */
    .firm-name p {
      font-size: 11px;
      color: #888;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: sans-serif;
    }

    .header-right { text-align: right; }

    .header-right p {
      font-size: 11px;
      color: #888;
      font-family: sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-right span {
      font-size: 15px;
      color: #C9951A;
      font-family: sans-serif;
      font-weight: 500;
    }

    /* ════════════════════════════════════════════════════════
        NAVEGAÇÃO DE MESES
        Barra para selecionar qual relatório mensal exibir.
        Estados: .active (selecionado), .unavailable (sem dados),
        .upcoming (futuro — não clicável).
        ════════════════════════════════════════════════════ */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 12px 18px;
      flex-wrap: wrap;
    }

    .month-nav-label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-family: sans-serif;
      margin-right: 6px;
      white-space: nowrap;
    }

    .month-tab {
      font-family: sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #444;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    /* Mês selecionado — destaque dourado */
    .month-tab.active {
      background: #C9951A;
      border-color: #C9951A;
      color: #1a1a1a;
      font-weight: 700;
    }

    /* Hover apenas para meses disponíveis e não ativos */
    .month-tab:not(.unavailable):not(.active):hover {
      border-color: #C9951A;
      color: #C9951A;
    }

    /* Mês sem base carregada — borda tracejada, opacidade reduzida */
    .month-tab.unavailable {
      opacity: 0.4;
      cursor: not-allowed;
      border-style: dashed;
    }

    /* Mês futuro — itálico, não interativo */
    .month-tab.upcoming {
      border-color: #444;
      color: #555;
      font-style: italic;
      cursor: default;
    }

    /* Separador visual entre grupos de meses */
    .month-nav-separator {
      width: 1px;
      height: 20px;
      background: #333;
      margin: 0 4px;
    }

    /* ════════════════════════════════════════════════════════
        FILTRO DE ÁREA JURÍDICA
        Permite filtrar todo o dashboard por área:
        Todas | Cível | Trabalhista | Tributário
        ════════════════════════════════════════════════════ */
    .area-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 10px 16px;
    }

    .area-filter span {
      font-size: 11px;
      color: #888;
      font-family: sans-serif;
    }

    .area-filter button {
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 14px;
      border: 1px solid #444;
      background: transparent;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* Área ativa — mesmo padrão dourado do mês ativo */
    .area-filter button.active {
      background: #C9951A;
      color: #1a1a1a;
      border-color: #C9951A;
      font-weight: 700;
    }

    /* ════════════════════════════════════════════════════════
        KPI CARDS — métricas principais (linha de 5 cards)
        Cada card tem uma barra colorida lateral (::before)
        que indica o tipo de métrica.
        ════════════════════════════════════════════════════ */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .kpi {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      position: relative;
      overflow: hidden;
    }

    /* Barra colorida na lateral esquerda de cada card */
    .kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: 4px 0 0 4px;
    }

    /* Paleta semântica por tipo de indicador */
    .kpi.gold::before  { background: #C9951A; } /* Total / destaque */
    .kpi.gray::before  { background: #6B6B6B; } /* Tarefas */
    .kpi.green::before { background: #3B6D11; } /* Prazos cumpridos */
    .kpi.red::before   { background: #A32D2D; } /* D+ / atrasos */
    .kpi.amber::before { background: #B8860B; } /* Sem justificativa */

    .kpi-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: sans-serif;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 400;
      color: #1a1a1a;
      line-height: 1;
    }

    .kpi-sub {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
      font-family: sans-serif;
    }

    /* Destaque dourado dentro do texto auxiliar */
    .kpi-sub b    { color: #C9951A; }

    /* Texto de alerta — usado para atrasos e violações */
    .kpi-sub.danger  { color: #A32D2D; font-weight: 600; }

    /* Texto positivo — cumprimentos de prazo */
    .kpi-sub.success { color: #3B6D11; font-weight: 600; }

    /* ════════════════════════════════════════════════════════
        MINI KPIs — breakdown de prazos por faixa (D0 a D+)
        5 cards menores exibindo a distribuição temporal
        dos prazos concluídos.
        ════════════════════════════════════════════════════ */
    .kpi-mid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .kpi-sm {
      background: #F1EFE8;
      border-radius: 8px;
      padding: 0.875rem 1rem;
      text-align: center;
    }

    .kpi-sm-label { font-size: 10px; color: #888; font-family: sans-serif; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .kpi-sm-val   { font-size: 24px; font-weight: 500; font-family: sans-serif; }
    .kpi-sm-pct   { font-size: 11px; font-family: sans-serif; color: #888; margin-top: 2px; }

    /* Cores semânticas por faixa de antecedência */
    .d0c  { color: #C9951A; } /* No dia */
    .dm1c { color: #9E7414; } /* 1 dia antes */
    .dm2c { color: #B8860B; } /* 2 dias antes */
    .dm3c { color: #6B6B6B; } /* 3+ dias antes */
    .dpc  { color: #A32D2D; } /* Após data fatal */

    /* ════════════════════════════════════════════════════════
        CARDS GENÉRICOS
        Base reutilizável para todas as seções de conteúdo.
        card-title tem decoração com barra dourada (::before).
        ════════════════════════════════════════════════════ */
    .card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 1.25rem;
    }

    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      font-family: sans-serif;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Barra decorativa dourada antes do título */
    .card-title::before {
      content: '';
      width: 14px; height: 3px;
      background: #C9951A;
      border-radius: 2px;
      display: inline-block;
      flex-shrink: 0;
    }

    /* ════════════════════════════════════════════════════════
        LAYOUTS DE GRADE — estrutura das seções
        charts-row: gráfico menor + ranking (proporção 1:1.8)
        bottom-row: stacked + tabela (proporção 1.2:1)
        two-col / three-col: grids simétricos
        ════════════════════════════════════════════════════ */
    .charts-row { display: grid; grid-template-columns: 1fr 1.8fr; gap: 12px; }
    .bottom-row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; }
    .two-col    { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .three-col  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    /* ════════════════════════════════════════════════════════
        TABELA DE RANKING — prazos por profissional
        Layout denso com avatar circular, badge de cargo
        e colunas numéricas centralizadas.
        ════════════════════════════════════════════════════ */
    .ranking-table { width: 100%; border-collapse: collapse; font-family: sans-serif; font-size: 12px; }

    .ranking-table thead th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      padding: 6px 8px;
      text-align: left;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
    }

    .ranking-table tbody tr { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
    .ranking-table tbody tr:last-child { border-bottom: none; }
    .ranking-table td { padding: 7px 8px; vertical-align: middle; }

    /* Célula com avatar circular + nome */
    .prof-cell { display: flex; align-items: center; }

    .prof-initial {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #F5E0A0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 500;
      color: #9E7414;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .num-center { text-align: center; }

    /* Badges de status D+ */
    .badge     { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 500; }
    .badge-dp  { background: #FECACA; color: #7F1D1D; } /* vermelho — atraso */
    .badge-ok  { background: #FEF3C7; color: #92400E; } /* âmbar — ok */

    /* ════════════════════════════════════════════════════════
        LEGENDAS DE GRÁFICO
        Lista horizontal de itens coloridos com rótulo.
        ════════════════════════════════════════════════════ */
    .legends { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; font-family: sans-serif; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ════════════════════════════════════════════════════════
        SEM JUSTIFICATIVA — cards por área
        Exibidos tanto para Advogados quanto Estagiários.
        Quando há ocorrências: fundo rosado + borda vermelha.
        ════════════════════════════════════════════════════ */
    .sj-area-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .sj-area-card {
      border-radius: 10px;
      padding: 1rem 1.1rem;
      border: 0.5px solid rgba(0,0,0,0.08);
      position: relative;
      overflow: hidden;
    }

    /* Faixa colorida no topo de cada card de área */
    .sj-area-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
    }

    /* Cor da faixa por área */
    .sj-area-card.civel::before       { background: #C9951A; }
    .sj-area-card.trabalhista::before { background: #9E7414; }
    .sj-area-card.tributario::before  { background: #B8860B; }

    /* Estado de alerta quando há violações */
    .sj-area-card.has-violations { background: #FFF8F8; border-color: rgba(163,45,45,0.2); }
    .sj-area-card.has-violations::before { background: #A32D2D; }

    .sj-area-name  { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #888; font-family: sans-serif; margin-bottom: 4px; }
    .sj-area-count { font-size: 26px; font-family: sans-serif; font-weight: 600; color: #1a1a1a; line-height: 1.1; }

    /* Cores semânticas por quantidade de ocorrências */
    .sj-area-count.zero   { color: #3B6D11; } /* nenhuma */
    .sj-area-count.warn   { color: #B8860B; } /* poucas */
    .sj-area-count.danger { color: #A32D2D; } /* muitas */
    .sj-area-sub { font-size: 11px; color: #888; font-family: sans-serif; margin-top: 3px; }

    /* Badge totalizador de sem justificativa */
    .sj-total-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: sans-serif;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .sj-total-badge.ok   { background: #EAF3DE; color: #3B6D11; }
    .sj-total-badge.warn { background: #FEF3C7; color: #92400E; }
    .sj-total-badge.bad  { background: #FECACA; color: #7F1D1D; }

    /* ════════════════════════════════════════════════════════
        DISTRIBUIÇÃO POR ÁREA — mini KPIs e gráfico
        3 cards com volume de prazos por área jurídica,
        seguidos de gráfico de barras horizontais.
        ════════════════════════════════════════════════════ */
    .area-dist-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .area-dist-card {
      background: #F1EFE8;
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }

    .area-dist-name  { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; font-family: sans-serif; margin-bottom: 4px; }
    .area-dist-count { font-size: 28px; font-family: sans-serif; font-weight: 600; }
    .area-dist-pct   { font-size: 12px; color: #888; font-family: sans-serif; margin-top: 3px; }

    /* Cores por área (aplicadas via classe no elemento filho) */
    .area-trab { color: #C9951A; }
    .area-civ  { color: #9E7414; }
    .area-trib { color: #B8860B; }

    /* ════════════════════════════════════════════════════════
        BANNER DE DADOS INDISPONÍVEIS
        Exibido quando o mês selecionado não tem base carregada.
        Borda tracejada indica estado "pendente".
        ════════════════════════════════════════════════════ */
    .no-data-banner {
      background: #F1EFE8;
      border: 1px dashed #D3D1C7;
      border-radius: 10px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      font-family: sans-serif;
    }

    .no-data-banner h3 { font-size: 14px; color: #444; margin-bottom: 6px; }
    .no-data-banner p  { font-size: 12px; color: #888; }

    /* ════════════════════════════════════════════════════════
        SEPARADOR DE SEÇÃO — linha dourada translúcida
        ════════════════════════════════════════════════════ */
    .section-sep {
      border: none;
      border-top: 1px solid rgba(201,149,26,0.2);
      margin: 2px 0;
    }

    /* Rodapé discreto no final do dashboard */
    .footer {
      text-align: center;
      font-family: sans-serif;
      font-size: 11px;
      color: #aaa;
      padding: 8px 0;
    }

  </style>
</head>
<body>

  <div class="dash">

    <!-- ════════════════════════════════════════════════════
        NAVEGADOR DE MESES
        Permite selecionar qual relatório mensal visualizar.
        Os estados dos botões são atualizados dinamicamente
        com base no JSON carregado (available: true/false).
        ════════════════════════════════════════════════════ -->
    <div class="month-nav">
      <span class="month-nav-label">Período:</span>
      <button class="month-tab unavailable" data-month="janeiro"  title="Base não carregada">Janeiro</button>
      <button class="month-tab"             data-month="fevereiro">Fevereiro</button>
      <button class="month-tab"             data-month="marco">Março</button>
      <button class="month-tab active"      data-month="abril">Abril</button>
      <div class="month-nav-separator"></div>
      <button class="month-tab upcoming"    data-month="maio" title="Disponível ao fim de maio">Maio · em breve</button>
    </div>

    <!-- ════════════════════════════════════════════════════
        FILTRO DE ÁREA JURÍDICA
        Botões que filtram todos os dados do dashboard
        pela área selecionada. O filtro é aplicado em
        renderDashboard() via função filtrarArea().
        ════════════════════════════════════════════════════ -->
    <div class="area-filter">
      <span>Área:</span>
      <button data-area="todas"       class="active">Todas</button>
      <button data-area="Cível">Cível</button>
      <button data-area="Trabalhista">Trabalhista</button>
      <button data-area="Tributário">Tributário</button>
    </div>

    <!-- ════════════════════════════════════════════════════
        CABEÇALHO — identidade visual do escritório
        O label do mês (#header-month-label) é atualizado
        dinamicamente ao trocar de período.
        ════════════════════════════════════════════════════ -->
    <div class="header">
      <div class="header-left">
        <img
          src="https://juvenizjr.com.br/wp-content/uploads/2022/07/icone_banner.png"
          class="logo-icon"
          alt="Logo Juveniz Jr">
        <div class="firm-name">
          <h1>Juveniz Jr. Rolim Ferraz</h1>
          <p>Advogados Associados</p>
        </div>
      </div>
      <div class="header-right">
        <p>Relatório de Concluídos</p>
        <span id="header-month-label"></span>
      </div>
    </div>

    <!-- ════════════════════════════════════════════════════
        CONTEÚDO PRINCIPAL
        Toda a estrutura de seções é injetada aqui via JS
        pela função buildDashboardHTML(). Isso permite trocar
        o mês sem recarregar a página.
        ════════════════════════════════════════════════════ -->
    <div id="main-content"></div>

    <!-- Rodapé fixo -->
    <div class="footer">Juveniz Jr · Rolim Ferraz Advogados · Dashboard de Concluídos · 2026</div>

  </div><!-- /.dash -->


  <script>
  /* ═══════════════════════════════════════════════════════════════════
      ESTADO GLOBAL DA APLICAÇÃO
      Todas as variáveis de estado ficam no topo para fácil
      localização. Nunca use variáveis globais soltas no código.
      ═══════════════════════════════════════════════════════════════ */
  let MONTHS_DATA = {};      // Dados do JSON carregado
  let currentMonth = 'abril'; // Mês selecionado no momento
  let areaAtual    = 'todas'; // Filtro de área ativo
  let charts       = {};      // Instâncias Chart.js (para destruir antes de recriar)


  /* ═══════════════════════════════════════════════════════════════════
      CARREGAMENTO DO JSON
      Busca dados externos e inicializa o dashboard.
      Atualiza visualmente quais meses têm base disponível.
      ═══════════════════════════════════════════════════════════════ */
  fetch("dados.json")
    .then(r => r.json())
    .then(data => {
      MONTHS_DATA = data;

      /* Ativa ou desativa botões de mês com base no JSON */
      document.querySelectorAll('.month-tab').forEach(btn => {
        const mes = btn.dataset.month;
        if (MONTHS_DATA[mes]?.available) {
          btn.classList.remove("unavailable");
        } else if (!btn.classList.contains('upcoming')) {
          btn.classList.add("unavailable");
        }
      });

      renderDashboard(currentMonth);
    })
    .catch(err => {
      console.error("Erro ao carregar JSON:", err);
    });


  /* ══════════════════════════════════════════════════════════════════
      FUNÇÕES UTILITÁRIAS
      ══════════════════════════════════════════════════════════════ */

  /* Formata número com separador de milhar em pt-BR (ex: 1.234) */
  function fmt(n) {
    return Number(n || 0).toLocaleString('pt-BR');
  }

  /* Calcula percentual e retorna string "X,X%" */
  function pct(part, total) {
    if (!total) return '0,0%';
    return (part / total * 100).toFixed(1).replace('.', ',') + '%';
  }

  /* Filtra lista de profissionais por área jurídica.
     Se área = 'todas', retorna a lista completa. */
  function filtrarArea(lista, area) {
    if (area === 'todas') return lista;
    return lista.filter(p => p.area === area);
  }

  /* Destrói instância Chart.js pelo ID antes de recriar.
     Necessário para evitar sobreposição de gráficos e
     vazamento de memória ao trocar de mês ou filtro. */
  function destroyChart(id) {
    if (charts[id]) {
      charts[id].destroy();
      delete charts[id];
    }
  }


  /* ══════════════════════════════════════════════════════════════════
      RENDERIZAÇÃO PRINCIPAL
      Ponto de entrada chamado ao trocar de mês ou filtro.
      Calcula todos os totais filtrados e passa para o HTML/gráficos.

      BUG CORRIGIDO #2: As variáveis calculadas aqui (d0Filtrado,
      dm1Filtrado etc.) precisavam ser passadas explicitamente para
      renderDonutChart() como objeto. O código original chamava
      renderDonutChart() sem argumentos e a função tentava acessar
      variáveis locais de outro escopo — causando o erro
      "ReferenceError: d0Filtrado is not defined".
      ══════════════════════════════════════════════════════════════ */
  function renderDashboard(monthKey) {
    const data = MONTHS_DATA[monthKey];
    if (!data) return;

    console.log(MONTHS_DATA[currentMonth]);

    const container = document.getElementById('main-content');

    /* Atualiza label do período no cabeçalho */
    document.getElementById('header-month-label').textContent = data.label;

    /* Se o mês não tem dados, exibe banner informativo e encerra */
    if (!data.available) {
      container.innerHTML = `
        <div class="no-data-banner">
          <h3>${data.label}</h3>
          <p>Base de dados ainda não carregada para este período.<br>
            Aguarde o fechamento do mês ou importe a planilha de concluídos.</p>
        </div>`;
      return;
    }

    /* ── Filtra lista de profissionais pela área selecionada ── */
    const listaFiltrada = filtrarArea(data.profData, areaAtual);

    /* ── Agrega totais da lista filtrada ── */
    const d0Filtrado  = listaFiltrada.reduce((acc, p) => acc + (p.d0  || 0), 0);
    const dm1Filtrado = listaFiltrada.reduce((acc, p) => acc + (p.dm1 || 0), 0);
    const dm2Filtrado = listaFiltrada.reduce((acc, p) => acc + (p.dm2 || 0), 0);
    const dm3Filtrado = listaFiltrada.reduce((acc, p) => acc + (p.dm3 || 0), 0);
    const dpFiltrado  = listaFiltrada.reduce((acc, p) => acc + (p.dp  || 0), 0);

    /* Total de prazos com faixa definida (denominador dos percentuais) */
    const prazosFiltrado = d0Filtrado + dm1Filtrado + dm2Filtrado + dm3Filtrado + dpFiltrado;

    /* Prazos processuais: sempre somados do profData (têm distribuição individual) */
    const prazosTotalFiltrado = listaFiltrada.reduce((acc, p) => acc + (p.prazos || 0), 0);

    
/* ── Tarefas e total concluídos ──
   🔥 Versão corrigida:
   - não depende mais de data.tarefas ou data.totalConcluidos
   - não usa estimativa proporcional (que gera erro)
   - calcula direto da fonte confiável: listaFiltrada
*/

const tarefasFiltrado =
  listaFiltrada.reduce((acc, p) => acc + (p.tarefas || 0), 0);

const totalConcluidosFiltrado =
  tarefasFiltrado + prazosTotalFiltrado;


    /* Soma de D0/D-1 sem justificativa registrada */
    const semJustificativaFiltrado =
      listaFiltrada.reduce((acc, p) => acc + (p.sem_justificativa || 0), 0);

    /* ── Injeta HTML das seções ── */
    container.innerHTML = buildDashboardHTML({
      ...data,           /* todos os campos do JSON (label, sjAdv, sjEst, areaTrabalhista etc.) */
      listaFiltrada,
      d0Filtrado,
      dm1Filtrado,
      dm2Filtrado,
      dm3Filtrado,
      dpFiltrado,
      prazosFiltrado,
      prazosTotalFiltrado,
      tarefasFiltrado,
      totalConcluidosFiltrado,
      semJustificativaFiltrado,
    });

    /* ── Renderiza cada gráfico passando os dados calculados ──
       BUG CORRIGIDO #3: renderDonutChart agora recebe o objeto
       com os valores filtrados como parâmetro, em vez de tentar
       acessar variáveis do escopo externo. */
    renderDonutChart({ d0: d0Filtrado, dm1: dm1Filtrado, dm2: dm2Filtrado, dm3: dm3Filtrado, dp: dpFiltrado });
    renderRankingChart(listaFiltrada);
    renderStackedChart(listaFiltrada);

    /* BUG CORRIGIDO #4: renderPerfChart recebia { prazos, dp }
       mas internamente usava d.profData (variável inexistente
       nesse escopo). Agora recebe listaFiltrada diretamente. */
    renderPerfChart(listaFiltrada);

    renderAreaChart(data);
  }


  /* ══════════════════════════════════════════════════════════════════
      CONSTRUÇÃO DO HTML DO DASHBOARD
      Recebe um objeto "d" com todos os dados necessários e
      retorna a string HTML das 8 seções do dashboard.

      BUG CORRIGIDO #5: O objeto spread (...data, listaFiltrada...)
      agora inclui explicitamente todas as variáveis calculadas
      (totalConcluidosFiltrado, prazosFiltrado etc.), evitando
      "not defined" dentro do template literal.

      BUG CORRIGIDO #6: listaFiltrada estava sendo acessada como
      variável solta em sortedPrazo (linha: [...listaFiltrada])
      mas o parâmetro da função chama-se d.listaFiltrada.
      ══════════════════════════════════════════════════════════════ */
  function buildDashboardHTML(d) {

    /* Ranking geral: todos os profissionais ordenados por total */
    const sortedAll = [...d.listaFiltrada].sort((a, b) => b.total - a.total);

    /* Ranking de prazos: só quem tem pelo menos 1 prazo registrado */
    const sortedPrazo = [...d.listaFiltrada]
      .filter(p => (p.d0 + p.dm1 + p.dm2 + p.dm3 + p.dp) > 0)
      .sort((a, b) =>
        (b.d0 + b.dm1 + b.dm2 + b.dm3 + b.dp) -
        (a.d0 + a.dm1 + a.dm2 + a.dm3 + a.dp)
      );

    /* Total de prazos por área para cálculo de percentual */
    const areaTotal = d.areaTrabalhista + d.areaCivel + d.areaTributario;

    /* ── Badge de sem justificativa: verde / âmbar / vermelho ── */
    function sjBadge(total) {
      if (total === 0) return `<span class="sj-total-badge ok">0 ocorrências</span>`;
      if (total <= 3)  return `<span class="sj-total-badge warn">${total} ocorrência${total > 1 ? 's' : ''}</span>`;
      return                  `<span class="sj-total-badge bad">${total} ocorrências</span>`;
    }

    /* ── Card de área para sem justificativa ── */
    function sjAreaCard(area, count, totalSj, cssClass) {
      const severity = count === 0 ? 'zero' : count <= 2 ? 'warn' : 'danger';
      const extra    = count > 0 ? ' has-violations' : '';
      const pctSj    = totalSj > 0 ? ` · ${pct(count, totalSj)} do total` : '';
      return `
        <div class="sj-area-card ${cssClass}${extra}">
          <div class="sj-area-name">${area}</div>
          <div class="sj-area-count ${severity}">${count}</div>
          <div class="sj-area-sub">caso${count !== 1 ? 's' : ''}${pctSj}</div>
        </div>`;
    }

    /* ── Linhas da tabela de prazos por profissional ──
       Medalhas para top 3; número simples para os demais.
       Badge de cargo colorido por tipo (Adv / Coord / Est). */
    const medals = ['🥇', '🥈', '🥉'];

    const rankRows = sortedPrazo.map((p, i) => {
      const t        = p.d0 + p.dm1 + p.dm2 + p.dm3 + p.dp;
      const initials = p.name.split(' ').map(n => n[0]).slice(0, 2).join('');

      /* Badge vermelho para D+ > 0; traço cinza se zerado */
      const dpBadge = p.dp > 0
        ? `<span class="badge badge-dp">${p.dp}</span>`
        : `<span style="color:#ccc;font-size:11px">—</span>`;

      /* Badge de cargo: cor diferente por função */
      let cargoBadge = '';
      if (p.cargo === 'Advogado') {
        cargoBadge = `<span style="font-size:9px;color:#C9951A;background:#FEF3C7;padding:1px 6px;border-radius:10px">Adv</span>`;
      } else if (p.cargo === 'Coordenador') {
        cargoBadge = `<span style="font-size:9px;color:#155E75;background:#E0F2FE;padding:1px 6px;border-radius:10px">Coord</span>`;
      } else {
        cargoBadge = `<span style="font-size:9px;color:#888;background:#F1EFE8;padding:1px 6px;border-radius:10px">Est</span>`;
      }

      return `
        <tr>
          <td style="font-size:13px;width:24px">
            ${i < 3
              ? medals[i]
              : `<span style="color:#aaa;font-size:11px">${i + 1}</span>`}
          </td>
          <td>
            <div class="prof-cell">
              <div class="prof-initial">${initials}</div>
              <div>
                <span style="color:#1a1a1a;font-weight:500">${p.name}</span>
                <div style="margin-top:2px">${cargoBadge}</div>
              </div>
            </div>
          </td>
          <td class="num-center" style="font-weight:600">${t}</td>
          <td class="num-center" style="color:#C9951A;font-weight:500">${p.d0  || '—'}</td>
          <td class="num-center" style="color:#9E7414">${p.dm1 || '—'}</td>
          <td class="num-center" style="color:#B8860B">${p.dm2 || '—'}</td>
          <td class="num-center">${dpBadge}</td>
        </tr>`;
    }).join('');

    /* ════════════════════════════════════════════════════════
        MONTAGEM DO HTML COMPLETO
        BUG CORRIGIDO #7: Três KPI cards tinham a tag </div>
        de fechamento faltando (Tarefas, Prazos Processuais
        e o card condicional de Etapas/Sem Justificativa).
        Isso quebrava o layout e impedia a formatação correta
        do valor "Total Concluídos" (aparecia como template
        literal não resolvido: "{fmt(totalConcluidos}").
        ════════════════════════════════════════════════════ */
    return `
      <!-- ════════════════════════════════════════
          SEÇÃO 1 — KPI CARDS: métricas principais
          5 cards com indicadores-chave do período.
          ════════════════════════════════════════ -->
      <div class="kpi-grid">

        <div class="kpi gold">
          <div class="kpi-label">Total concluídos</div>
          <div class="kpi-value">${fmt(d.totalConcluidosFiltrado)}</div>
          <div class="kpi-sub">tarefas, prazos e etapas</div>
        </div>

        <div class="kpi gray">
          <div class="kpi-label">Tarefas</div>
          <div class="kpi-value">${fmt(d.tarefasFiltrado)}</div>
          <div class="kpi-sub">
            <b>${pct(d.tarefasFiltrado, d.totalConcluidosFiltrado)}</b> do total
          </div>
        </div><!-- /kpi tarefas — BUG CORRIGIDO: </div> estava faltando -->

        <div class="kpi green">
          <div class="kpi-label">Prazos processuais</div>
          <div class="kpi-value">${fmt(d.prazosTotalFiltrado)}</div>
          <div class="kpi-sub success">
            ${pct(d.prazosTotalFiltrado - d.dpFiltrado, d.prazosTotalFiltrado)} cumpridos no prazo
          </div>
        </div><!-- /kpi prazos — BUG CORRIGIDO: </div> estava faltando -->

        ${d.etapas > 0 ? `
        <div class="kpi amber">
          <div class="kpi-label">Etapas de prazo</div>
          <div class="kpi-value">${fmt(d.etapas)}</div>
          <div class="kpi-sub">${pct(d.etapas, d.totalConcluidos)} do total</div>
        </div>` : `
        <div class="kpi amber">
          <div class="kpi-label">Sem justificativa</div>
          <div class="kpi-value" style="color:#B8860B">${d.semJustificativaFiltrado}</div>
          <div class="kpi-sub">D0/D-1 sem registro</div>
        </div>`}<!-- /kpi condicional — BUG CORRIGIDO: </div> estava faltando no bloco else -->

        <div class="kpi red">
          <div class="kpi-label">Após data fatal (D+)</div>
          <div class="kpi-value">${d.dpFiltrado}</div>
          <div class="kpi-sub danger">${pct(d.dpFiltrado, d.prazosTotalFiltrado)} dos prazos</div>
        </div>

      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 2 — MINI KPIs: breakdown D0 → D+
          Distribui os prazos pelas 5 faixas de
          antecedência. Base para o gráfico donut.
          ════════════════════════════════════════ -->
      <div class="kpi-mid">
        <div class="kpi-sm">
          <div class="kpi-sm-label">⚡ D0</div>
          <div class="kpi-sm-val d0c">${d.d0Filtrado}</div>
          <div class="kpi-sm-pct">${pct(d.d0Filtrado, d.prazosFiltrado)}</div>
        </div>
        <div class="kpi-sm">
          <div class="kpi-sm-label">🟡 D-1</div>
          <div class="kpi-sm-val dm1c">${d.dm1Filtrado}</div>
          <div class="kpi-sm-pct">${pct(d.dm1Filtrado, d.prazosFiltrado)}</div>
        </div>
        <div class="kpi-sm">
          <div class="kpi-sm-label">🟠 D-2</div>
          <div class="kpi-sm-val dm2c">${d.dm2Filtrado}</div>
          <div class="kpi-sm-pct">${pct(d.dm2Filtrado, d.prazosFiltrado)}</div>
        </div>
        <div class="kpi-sm">
          <div class="kpi-sm-label">⚪ D-3 ou antes</div>
          <div class="kpi-sm-val dm3c">${d.dm3Filtrado}</div>
          <div class="kpi-sm-pct">${pct(d.dm3Filtrado, d.prazosFiltrado)}</div>
        </div>
        <div class="kpi-sm">
          <div class="kpi-sm-label">🔴 D+ (fatal)</div>
          <div class="kpi-sm-val dpc">${d.dpFiltrado}</div>
          <div class="kpi-sm-pct">${pct(d.dpFiltrado, d.prazosFiltrado)}</div>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 3 — DONUT + RANKING GERAL
          Donut: distribuição visual das faixas D0→D+
          Ranking: top 10 profissionais por volume total
          ════════════════════════════════════════ -->
      <div class="charts-row">
        <div class="card">
          <div class="card-title">distribuição de prazos</div>
          <div class="legends">
            <div class="legend-item"><div class="legend-dot" style="background:#C9951A"></div>D0 — ${d.d0Filtrado}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#9E7414"></div>D-1 — ${d.dm1Filtrado}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#E5C97A"></div>D-2 — ${d.dm2Filtrado}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#6B6B6B"></div>D-3+ — ${d.dm3Filtrado}</div>
            <div class="legend-item"><div class="legend-dot" style="background:#A32D2D"></div>D+ fatal — ${d.dpFiltrado}</div>
          </div>
          <div style="position:relative;width:100%;height:220px">
            <canvas id="donutChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">ranking — total de concluídos por profissional</div>
          <div style="position:relative;width:100%;height:${Math.max(260, sortedAll.slice(0, 10).length * 32 + 60)}px">
            <canvas id="rankChart"></canvas>
          </div>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 4 — STACKED + TABELA DE PRAZOS
          Stacked: breakdown empilhado por profissional
          Tabela: detalhe numérico com badge D+ destacado
          ════════════════════════════════════════ -->
      <div class="bottom-row">
        <div class="card">
          <div class="card-title">prazos por profissional — breakdown D0/D-1/D-2/D+</div>
          <div style="position:relative;width:100%;height:${Math.max(300, sortedPrazo.length * 28 + 80)}px">
            <canvas id="stackedChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">tabela de prazos por profissional</div>
          <table class="ranking-table">
            <thead>
              <tr>
                <th></th>
                <th>Profissional</th>
                <th class="num-center">Total</th>
                <th class="num-center">D0</th>
                <th class="num-center">D-1</th>
                <th class="num-center">D-2</th>
                <th class="num-center">D+</th>
              </tr>
            </thead>
            <tbody>${rankRows}</tbody>
          </table>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 5 — PERFORMANCE GERAL
          Barras agrupadas: prazos cumpridos vs D+
          por profissional — visão comparativa rápida.
          ════════════════════════════════════════ -->
      <div class="card">
        <div class="card-title">performance geral — prazos cumpridos vs. após data fatal</div>
        <div class="legends">
          <div class="legend-item"><div class="legend-dot" style="background:#C9951A"></div>Prazos dentro do prazo</div>
          <div class="legend-item"><div class="legend-dot" style="background:#A32D2D"></div>Após data fatal (D+)</div>
        </div>
        <div style="position:relative;width:100%;height:260px">
          <canvas id="perfChart"></canvas>
        </div>
      </div>

      <hr class="section-sep">

      <!-- ════════════════════════════════════════
          SEÇÃO 6 — SEM JUSTIFICATIVA · ADVOGADOS
          D0/D-1 concluídos sem justificativa registrada.
          Cada ocorrência implica perda de bônus trimestral.
          ════════════════════════════════════════ -->
      <!-- ════════════════════════════════════════
          SEÇÃO 7 — SEM JUSTIFICATIVA · ESTAGIÁRIOS
          Mesmo critério; sem impacto em bônus.
          Registrado para gestão e acompanhamento.
          ════════════════════════════════════════ -->
      <div class="two-col">
        <div class="card">
          <div class="card-title">sem justificativa · advogados — por área</div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
            ${sjBadge(d.sjAdv.total)}
            <span style="font-family:sans-serif;font-size:11px;color:#888">
              D0 e D-1 concluídos sem justificativa registrada
            </span>
          </div>
          <div class="sj-area-grid">
            ${sjAreaCard('Cível',       d.sjAdv.civel,       d.sjAdv.total, 'civel')}
            ${sjAreaCard('Trabalhista', d.sjAdv.trabalhista,  d.sjAdv.total, 'trabalhista')}
            ${sjAreaCard('Tributário',  d.sjAdv.tributario,   d.sjAdv.total, 'tributario')}
          </div>
          <div style="margin-top:12px;font-family:sans-serif;font-size:10px;color:#aaa;line-height:1.5">
            ⚠️ Cada ocorrência sem justificativa implica perda do bônus trimestral para o advogado responsável.
          </div>
        </div>
        <div class="card">
          <div class="card-title">sem justificativa · estagiários — por área</div>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap">
            ${sjBadge(d.sjEst.total)}
            <span style="font-family:sans-serif;font-size:11px;color:#888">
              D0 e D-1 concluídos sem justificativa registrada
            </span>
          </div>
          <div class="sj-area-grid">
            ${sjAreaCard('Cível',       d.sjEst.civel,      d.sjEst.total, 'civel')}
            ${sjAreaCard('Trabalhista', d.sjEst.trabalhista, d.sjEst.total, 'trabalhista')}
            ${sjAreaCard('Tributário',  d.sjEst.tributario,  d.sjEst.total, 'tributario')}
          </div>
          <div style="margin-top:12px;font-family:sans-serif;font-size:10px;color:#aaa;line-height:1.5">
            ℹ️ Estagiários não participam do bônus trimestral. Acompanhamento para fins de gestão e formação.
          </div>
        </div>
      </div>

      <!-- ════════════════════════════════════════
          SEÇÃO 8 — DISTRIBUIÇÃO POR ÁREA JURÍDICA
          Mini KPIs + gráfico de barras horizontais
          mostrando volume de prazos por área.
          Fonte: Tabela Dinâmica · Tipo=Prazo, Evento=Principal.
          ════════════════════════════════════════ -->
      <div class="card">
        <div class="card-title">distribuição de prazos por área jurídica</div>
        <div class="area-dist-grid">
          <div class="area-dist-card">
            <div class="area-dist-name">Trabalhista</div>
            <div class="area-dist-count area-trab">${d.areaTrabalhista}</div>
            <div class="area-dist-pct">${pct(d.areaTrabalhista, areaTotal)} dos prazos</div>
          </div>
          <div class="area-dist-card">
            <div class="area-dist-name">Cível</div>
            <div class="area-dist-count area-civ">${d.areaCivel}</div>
            <div class="area-dist-pct">${pct(d.areaCivel, areaTotal)} dos prazos</div>
          </div>
          <div class="area-dist-card">
            <div class="area-dist-name">Tributário</div>
            <div class="area-dist-count area-trib">${d.areaTributario}</div>
            <div class="area-dist-pct">${pct(d.areaTributario, areaTotal)} dos prazos</div>
          </div>
        </div>
        <div class="legends">
          <div class="legend-item"><div class="legend-dot" style="background:#C9951A"></div>Trabalhista — ${d.areaTrabalhista}</div>
          <div class="legend-item"><div class="legend-dot" style="background:#9E7414"></div>Cível — ${d.areaCivel}</div>
          <div class="legend-item"><div class="legend-dot" style="background:#E5C97A"></div>Tributário — ${d.areaTributario}</div>
        </div>
        <div style="position:relative;width:100%;height:140px">
          <canvas id="areaChart"></canvas>
        </div>
      </div>
    `;
  }


  /* ══════════════════════════════════════════════════════════════════
      GRÁFICOS — funções de renderização individuais
      Cada função: (1) destrói instância anterior, (2) cria nova.
      ══════════════════════════════════════════════════════════════ */

  /* ── Donut: distribuição de prazos por faixa D0→D+
     BUG CORRIGIDO #2 (detalhe): recebe "vals" como parâmetro
     com os valores já calculados e filtrados. Antes tentava
     acessar variáveis locais de renderDashboard(), que não
     existem neste escopo — causando ReferenceError. ── */
  function renderDonutChart(vals) {
    destroyChart('donut');
    charts['donut'] = new Chart(document.getElementById('donutChart'), {
      type: 'doughnut',
      data: {
        labels: ['D0', 'D-1', 'D-2', 'D-3+', 'D+ Fatal'],
        datasets: [{
          data: [vals.d0, vals.dm1, vals.dm2, vals.dm3, vals.dp],
          backgroundColor: ['#C9951A', '#9E7414', '#E5C97A', '#6B6B6B', '#A32D2D'],
          borderWidth: 1.5,
          borderColor: '#fff',
          hoverOffset: 16,
          hoverBorderWidth: 3,
          hoverBorderColor: '#000'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '62%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a1a',
            titleColor: '#fff',
            bodyColor: '#fff',
            borderColor: '#444',
            borderWidth: 1,
            padding: 10,
            callbacks: {
              label: (c) => {
                const total = c.dataset.data.reduce((a, b) => a + b, 0);
                const pctVal = ((c.raw / total) * 100).toFixed(1).replace('.', ',');
                return ` ${c.label}: ${c.raw} (${pctVal}%)`;
              }
            }
          }
        },
        onHover: (e, elements) => {
          e.native.target.style.cursor = elements.length ? 'pointer' : 'default';
        }
      }
    });
  }

  /* ── Barras horizontais: ranking top 10 por total de concluídos ── */
  function renderRankingChart(lista) {
    destroyChart('rank');
    const top10 = [...lista].sort((a, b) => b.total - a.total).slice(0, 10);
    charts['rank'] = new Chart(document.getElementById('rankChart'), {
      type: 'bar',
      data: {
        labels: top10.map(p => p.name.split(' ').slice(0, 2).join(' ')),
        datasets: [{
          label: 'Total',
          data: top10.map(p => p.total),
          /* Ouro para 1º, bronze para 2º e 3º, cinza para demais */
          backgroundColor: top10.map((_, i) =>
            i === 0 ? '#C9951A' : i === 1 ? '#9E7414' : i === 2 ? '#E5C97A' : '#D3D1C7'),
          borderRadius: 4,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: (c) => ` ${c.raw} concluídos` } }
        },
        scales: {
          x: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 11 } } },
          y: { grid: { display: false }, ticks: { font: { size: 11 } } }
        }
      }
    });
  }

  /* ── Barras empilhadas: breakdown D0/D-1/D-2/D-3+/D+ por profissional ── */
  function renderStackedChart(lista) {
    destroyChart('stacked');
    const sorted = [...lista]
      .filter(p => (p.d0 + p.dm1 + p.dm2 + p.dm3 + p.dp) > 0)
      .sort((a, b) =>
        (b.d0 + b.dm1 + b.dm2 + b.dm3 + b.dp) -
        (a.d0 + a.dm1 + a.dm2 + a.dm3 + a.dp));

    charts['stacked'] = new Chart(document.getElementById('stackedChart'), {
      type: 'bar',
      data: {
        labels: sorted.map(p => p.name.split(' ').slice(0, 2).join(' ')),
        datasets: [
          { label: 'D0',       data: sorted.map(p => p.d0),  backgroundColor: '#C9951A', stack: 'a' },
          { label: 'D-1',      data: sorted.map(p => p.dm1), backgroundColor: '#9E7414', stack: 'a' },
          { label: 'D-2',      data: sorted.map(p => p.dm2), backgroundColor: '#E5C97A', stack: 'a' },
          { label: 'D-3+',     data: sorted.map(p => p.dm3), backgroundColor: '#B4B2A9', stack: 'a' },
          { label: 'D+ Fatal', data: sorted.map(p => p.dp),  backgroundColor: '#A32D2D', stack: 'a' },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { stacked: true, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 10 } } },
          y: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } }
        }
      }
    });
  }

  /* ── Barras empilhadas: prazos no prazo vs D+ por profissional
     BUG CORRIGIDO #4: a função recebia {prazos, dp} mas usava
     internamente d.profData (undefined). Agora recebe "lista"
     (listaFiltrada) diretamente, consistente com as demais. ── */
  function renderPerfChart(lista) {
    destroyChart('perf');
    const sorted = [...lista]
      .filter(p => p.total > 0)
      .sort((a, b) => b.total - a.total);

    charts['perf'] = new Chart(document.getElementById('perfChart'), {
      type: 'bar',
      data: {
        labels: sorted.map(p => p.name.split(' ').slice(0, 2).join(' ')),
        datasets: [
          {
            label: 'Prazos no prazo',
            data: sorted.map(p => (p.d0 || 0) + (p.dm1 || 0) + (p.dm2 || 0) + (p.dm3 || 0)),
            backgroundColor: '#C9951A',
            borderRadius: 3,
            stack: 's'
          },
          {
            label: 'D+ Fatal',
            data: sorted.map(p => p.dp || 0),
            backgroundColor: '#A32D2D',
            borderRadius: 3,
            stack: 's'
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            stacked: true,
            grid: { display: false },
            ticks: { font: { size: 10 }, maxRotation: 35, autoSkip: false }
          },
          y: {
            stacked: true,
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { font: { size: 11 } }
          }
        }
      }
    });
  }

  /* ── Barras horizontais: distribuição de prazos por área jurídica ── */
  function renderAreaChart(d) {
    destroyChart('area');
    const total = d.areaTrabalhista + d.areaCivel + d.areaTributario;
    charts['area'] = new Chart(document.getElementById('areaChart'), {
      type: 'bar',
      data: {
        labels: ['Trabalhista', 'Cível', 'Tributário'],
        datasets: [{
          label: 'Prazos',
          data: [d.areaTrabalhista, d.areaCivel, d.areaTributario],
          backgroundColor: ['#C9951A', '#9E7414', '#E5C97A'],
          borderRadius: 6,
          borderSkipped: false,
          barThickness: 28
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (c) => ` ${c.raw} prazos (${pct(c.raw, total)})`
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(0,0,0,0.04)' },
            ticks: { font: { size: 11 } },
            max: Math.max(d.areaTrabalhista, d.areaCivel, d.areaTributario) * 1.15
          },
          y: {
            grid: { display: false },
            ticks: { font: { size: 12, weight: 500 } }
          }
        }
      }
    });
  }


  /* ══════════════════════════════════════════════════════════════════
      EVENTOS DE INTERAÇÃO
      ══════════════════════════════════════════════════════════════ */

  /* ── Navegação de meses ──
     Ignora clique em "upcoming" (mês futuro).
     Atualiza visual dos tabs e re-renderiza o dashboard. */
  document.querySelectorAll('.month-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.classList.contains('upcoming'))   return;
      if (btn.classList.contains('unavailable')) return;

      document.querySelectorAll('.month-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      currentMonth = btn.dataset.month;
      renderDashboard(currentMonth);
    });
  });

  /* ── Filtro de área ──
     Atualiza areaAtual e re-renderiza com os dados filtrados.
     O filtro é aplicado dentro de renderDashboard(). */
  document.querySelectorAll('.area-filter button').forEach(btn => {
    btn.addEventListener('click', () => {
      areaAtual = btn.dataset.area;

      document.querySelectorAll('.area-filter button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      renderDashboard(currentMonth);
    });
  });

  </script>

</body>
</html>
